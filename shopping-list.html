<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 28px 24px 20px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .stats {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-bar button {
      padding: 5px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #64748b;
    }

    .filter-bar button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      padding: 40px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      transition: background 0.1s;
    }

    .item:hover {
      background: #f8fafc;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1e293b;
      word-break: break-all;
      transition: all 0.2s;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 1.1rem;
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .footer {
      padding: 14px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      font-size: 0.83rem;
      color: #94a3b8;
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 0.83rem;
      color: #94a3b8;
      cursor: pointer;
      transition: color 0.15s;
    }

    .clear-btn:hover {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <div class="stats" id="stats">0개 중 0개 완료</div>
    </header>

    <div class="input-area">
      <input type="text" id="itemInput" placeholder="아이템 입력 후 Enter 또는 추가 버튼" />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="filter-bar">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('todo', this)">미완료</button>
      <button onclick="setFilter('done', this)">완료</button>
    </div>

    <ul class="list" id="list"></ul>

    <div class="footer">
      <span id="footerInfo"></span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = items.filter(item => {
        if (filter === 'todo') return !item.done;
        if (filter === 'done') return item.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">아이템이 없습니다</div>';
      } else {
        list.innerHTML = filtered.map(item => `
          <li class="item ${item.done ? 'done' : ''}" data-id="${item.id}">
            <input type="checkbox" ${item.done ? 'checked' : ''}
              onchange="toggle(${item.id})" />
            <span class="item-text">${escapeHtml(item.text)}</span>
            <button class="delete-btn" onclick="remove(${item.id})" title="삭제">✕</button>
          </li>
        `).join('');
      }

      const done = items.filter(i => i.done).length;
      document.getElementById('stats').textContent =
        `${items.length}개 중 ${done}개 완료`;
      document.getElementById('footerInfo').textContent =
        `총 ${items.length}개`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) item.done = !item.done;
      save();
      render();
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
